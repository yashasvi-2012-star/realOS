<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZENOS OS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;   
    background:url('https://4kwallpapers.com/images/walls/thumbs_2t/25242.jpg') center/cover no-repeat;
}

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(rgba(60,10,25,.2), rgba(80,15,35,.4));
    pointer-events:none;
}

/* HEADER */
.header{
    position:absolute;
    top:15px;
    left:15px;
    right:15px;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    border-radius:18px;
    background:rgba(90,20,35,.4);
    backdrop-filter:blur(15px);
    color:white;
    z-index:1000;
}

.logo{ font-size:28px; font-weight:700; }

.datetime{ display:flex; gap:40px; }

/* WINDOWS */
.window{
    position:absolute;
    background:rgba(90,20,35,.45);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:16px;
    color:white;
    overflow:hidden;
    z-index:10;
}

.windowHeader{
    padding:10px;
    backgrodnd:rgba(255,255,255,.1);
    cursor:move;
    font-weight:bold;
}

/* CALCULATOR */
#calculator{
    width:300px;
    left:40px;
    top:140px;
}

#display{
    width:90%;
    margin:10px;
    height:50px;
    border:none;
    border-radius:8px;
    padding:10px;
    font-size:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    padding:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* NOTEPAD */
#notepad{
    width:380px;
    height:260px;
    right:40px;
    top:200px;
}

textarea{
    width:100%;
    height:210px;
    border:none;
    outline:none;
    resize:none;
    padding:10px;
    background:transparent;
    color:white;
}

/* DRAWING */
#drawingApp{
    width:520px;
    height:430px;
    left:350px;
    top:160px;
}

.drawingTools{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(255,255,255,.06);
}

.drawingTools input[type="color"]{
    width:42px;
    height:36px;
    border:none;
    border-radius:8px;
    background:transparent;
    cursor:pointer;
}

.drawingTools input[type="range"]{
    width:120px;
    accent-color:#ffd6dc;
}

.drawingTools button{
    padding:9px 12px;
    background:rgba(255,255,255,.88);
    color:#40101d;
    font-weight:600;
}

.drawingTools button.active{
    background:#ffd6dc;
}

canvas{
    display:block;
    margin:10px auto;
    background:rgba(0,0,0,.2);
    border-radius:10px;
    cursor:crosshair;
    touch-action:none;
}

/* SPOTIFY */
#spotify{
    width:340px;
    height:450px;
    left:60px;
    top:420px;
}

/* CLOCK */
#bigClock{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:220px;
    height:220px;
    border-radius:50%;
    background:rgba(90,20,35,.4);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    z-index:30;
}

.hand{
    position:absolute;
    left:50%;
    bottom:50%;
    transform-origin:bottom;
}

.hour{ width:6px; height:60px; background:white; margin-left:-3px; }
.minute{ width:4px; height:80px; background:white; margin-left:-2px; }
.second{ width:2px; height:95px; background:#ffd6dc; margin-left:-1px; }

.center{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#dragClock{
    position:absolute;
    inset:0;
    cursor:move;
    z-index:4;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">ZENOS</div>
    <div class="datetime">
        <span id="day"></span>
        <span id="date"></span>
        <span id="time"></span>
    </div>
</div>

<!-- CLOCK -->
<div id="bigClock">
    <div id="dragClock"></div>
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="hand second"></div>
    <div class="center"></div>
</div>

<!-- CALCULATOR -->
<div id="calculator" class="window">
    <div class="windowHeader">Calculator</div>
    <input id="display" readonly />
    <div class="buttons">
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('+')">+</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')">-</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="calc()">=</button>

        <button onclick="add('0')">0</button>
        <button onclick="clearCalc()">C</button>
    </div>
</div>

<!-- NOTEPAD -->
<div id="notepad" class="window">
    <div class="windowHeader">Notepad</div>
    <textarea placeholder="write something..."></textarea>
</div>

<!-- DRAWING -->
<div id="drawingApp" class="window">
    <div class="windowHeader">Drawing Pad</div>
    <div class="drawingTools">
        <input id="brushColor" type="color" value="#ffffff" title="Brush color" />
        <input id="brushSize" type="range" min="1" max="30" value="3" title="Brush size" />
        <button id="eraserBtn" type="button">Eraser</button>
        <button id="clearCanvas" type="button">Clear</button>
    </div>
    <canvas id="canvas" width="500" height="300"></canvas>
</div>

<!-- SPOTIFY -->
<div id="spotify" class="window">
    <div class="windowHeader">Spotify</div>
    <iframe
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
        width="320"
        height="380"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
</div>

<script>

/* TIME */
function updateTime(){
    const now=new Date();
    document.getElementById("day").innerText=now.toLocaleDateString('en-US',{weekday:'long'});
    document.getElementById("date").innerText=now.toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById("time").innerText=now.toLocaleTimeString('en-US',{hour12:true});
}
setInterval(updateTime,1000);
updateTime();

/* CLOCK */
function updateClock(){
    const now=new Date();
    const h=now.getHours()%12;
    const m=now.getMinutes();
    const s=now.getSeconds();

    document.querySelector(".hour").style.transform=`rotate(${h*30+m/2}deg)`;
    document.querySelector(".minute").style.transform=`rotate(${m*6}deg)`;
    document.querySelector(".second").style.transform=`rotate(${s*6}deg)`;
}
setInterval(updateClock,1000);
updateClock();

/* CALCULATOR */
let display=document.getElementById("display");
function add(v){ display.value+=v; }
function clearCalc(){ display.value=""; }
function calc(){ try{ display.value=eval(display.value); } catch{ alert("Error"); } }

/* DRAG */
let topLayer=40;

function drag(el){
    const header=el.querySelector(".windowHeader");
    let dragging=false,ox=0,oy=0;

    header.addEventListener("pointerdown",(e)=>{
        dragging=true;
        el.style.zIndex=++topLayer;
        ox=e.clientX-el.offsetLeft;
        oy=e.clientY-el.offsetTop;
        header.setPointerCapture(e.pointerId);
    });

    header.addEventListener("pointermove",(e)=>{
        if(!dragging) return;
        el.style.left=(e.clientX-ox)+"px";
        el.style.top=(e.clientY-oy)+"px";
        el.style.right="auto";
    });

    header.addEventListener("pointerup",(e)=>{
        dragging=false;
        header.releasePointerCapture(e.pointerId);
    });

    header.addEventListener("pointercancel",()=>dragging=false);
}

drag(document.getElementById("calculator"));
drag(document.getElementById("notepad"));
drag(document.getElementById("drawingApp"));
drag(document.getElementById("spotify"));

/* CLOCK DRAG */
function dragClock(clock){
    const area=document.getElementById("dragClock");
    let dragging=false,ox=0,oy=0;

    area.addEventListener("pointerdown",(e)=>{
        const rect=clock.getBoundingClientRect();
        dragging=true;
        clock.style.zIndex=++topLayer;
        clock.style.left=rect.left+"px";
        clock.style.top=rect.top+"px";
        clock.style.transform="none";
        ox=e.clientX-rect.left;
        oy=e.clientY-rect.top;
        area.setPointerCapture(e.pointerId);
    });

    area.addEventListener("pointermove",(e)=>{
        if(!dragging) return;
        clock.style.left=(e.clientX-ox)+"px";
        clock.style.top=(e.clientY-oy)+"px";
    });

    area.addEventListener("pointerup",(e)=>{
        dragging=false;
        area.releasePointerCapture(e.pointerId);
    });

    area.addEventListener("pointercancel",()=>dragging=false);
}
dragClock(document.getElementById("bigClock"));

/* DRAWING */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const brushColor=document.getElementById("brushColor");
const brushSize=document.getElementById("brushSize");
const eraserBtn=document.getElementById("eraserBtn");
const clearCanvas=document.getElementById("clearCanvas");
let drawing=false;
let erasing=false;

eraserBtn.addEventListener("click",()=>{
    erasing=!erasing;
    eraserBtn.classList.toggle("active",erasing);
    canvas.style.cursor=erasing ? "cell" : "crosshair";
});

clearCanvas.addEventListener("click",()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
});

function setBrush(){
    ctx.lineWidth=brushSize.value;
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.globalCompositeOperation=erasing ? "destination-out" : "source-over";
    ctx.strokeStyle=brushColor.value;
}

function getCanvasPoint(e){
    const rect=canvas.getBoundingClientRect();
    return {
        x:(e.clientX-rect.left)*(canvas.width/rect.width),
        y:(e.clientY-rect.top)*(canvas.height/rect.height)
    };
}

canvas.addEventListener("pointerdown",(e)=>{
    const point=getCanvasPoint(e);
    drawing=true;
    canvas.setPointerCapture(e.pointerId);
    setBrush();
    ctx.beginPath();
    ctx.moveTo(point.x,point.y);
});

canvas.addEventListener("pointermove",(e)=>{
    if(!drawing) return;
    const point=getCanvasPoint(e);
    setBrush();
    ctx.lineTo(point.x,point.y);
    ctx.stroke();
});

canvas.addEventListener("pointerup",(e)=>{
    drawing=false;
    canvas.releasePointerCapture(e.pointerId);
    ctx.beginPath();
});

canvas.addEventListener("pointercancel",()=>{
    drawing=false;
    ctx.beginPath();
});
      
</script>

</body>
</html>
