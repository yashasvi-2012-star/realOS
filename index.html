<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENOS OS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;

    background:url('https://4kwallpapers.com/images/walls/thumbs_2t/25242.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Overlay */

body::before{
    content:'';
    position:absolute;
    inset:0;

    background:
    linear-gradient(
    rgba(60,10,25,.15),
    rgba(80,15,35,.35));

    pointer-events:none;
}

/* Header */

.header{
    position:absolute;

    top:15px;
    left:15px;
    right:15px;

    height:80px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 30px;

    border-radius:20px;

    background:rgba(90,20,35,.40);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    color:white;

    z-index:100;
}

.logo{
    font-size:32px;
    font-weight:700;
    color:#ffd6dc;
}

.datetime{
    display:flex;
    gap:80px;
    font-weight:600;
}
/*drawing tool*/
#drawingApp{
    width:540px;
    height:400px;

    left:400px;
    top:150px;
}

#drawingCanvas{
    display:block;

    margin:10px auto;

    border:1px solid rgba(255,255,255,.2);

    border-radius:12px;

    background:rgba(0,0,0,.2);

    cursor:crosshair;
}
/* Big Clock */

#bigClock{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:240px;
    height:240px;

    border-radius:50%;

    background:rgba(90,20,35,.40);

    backdrop-filter:blur(20px);

    border:4px solid rgba(255,255,255,.2);

    box-shadow:
    0 10px 40px rgba(0,0,0,.3);

    z-index:15;
}

.hand{
    position:absolute;
    left:50%;
    bottom:50%;
    transform-origin:bottom;
}

.hourHand{
    width:6px;
    height:70px;
    background:white;
    margin-left:-3px;
}

.minuteHand{
    width:4px;
    height:95px;
    background:white;
    margin-left:-2px;
}

.secondHand{
    width:2px;
    height:115px;
    background:#ffd6dc;
    margin-left:-1px;
}

.centerDot{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:white;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}
#clockDragArea{

    position:absolute;

    inset:0;

    border-radius:50%;

    cursor:move;

    z-index:50;
}

/* Windows */

.window{

    position:absolute;

    background:rgba(90,20,35,.40);

    backdrop-filter:blur(20px);

    border-radius:20px;

    border:1px solid rgba(255,255,255,.15);

    color:white;

    overflow:hidden;
}

.windowHeader{

    padding:12px 15px;

    background:rgba(255,255,255,.08);

    cursor:move;

    font-weight:bold;
}

/* Calculator */

#calculator{

    width:320px;

    left:40px;
    top:160px;
}

#display{

    width:90%;
    height:55px;

    margin:15px;

    border:none;

    border-radius:10px;

    padding:10px;

    font-size:22px;
}

.buttons{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:8px;

    padding:0 15px 15px;
}

.buttons button{

    height:50px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-size:18px;
}

/* Notepad */

#notepad{

    width:420px;
    height:300px;

    right:40px;
    top:220px;
}

#notepad textarea{

    width:100%;
    height:250px;

    border:none;

    outline:none;

    resize:none;

    background:transparent;

    color:white;

    padding:15px;

    font-size:16px;
}

/* Bottom Left Image */

#cornerImage{

    position:absolute;

    right:25px;
    bottom:25px;

    width:280px;

    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.3);

    z-index:20;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">
        ZENOS
    </div>

    <div class="datetime">

        <span id="day"></span>

        <span id="date"></span>

        <span id="time"></span>

    </div>

</div>

<!-- BIG CLOCK -->

<div id="bigClock">

    <div id="clockDragArea"></div>

    <div class="hand hourHand"></div>

    <div class="hand minuteHand"></div>

    <div class="hand secondHand"></div>

    <div class="centerDot"></div>

</div>
<!-- CALCULATOR -->

<div id="calculator" class="window">

    <div class="windowHeader">
         Calculator
    </div>

    <input id="display" readonly>

    <div class="buttons">

        <button onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')">/</button>
        <button onclick="appendValue('*')">*</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="calculate()">=</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('.')">.</button>

        <button onclick="appendValue('0')">0</button>

    </div>

</div>

<!-- NOTEPAD -->

<div id="notepad" class="window">

    <div class="windowHeader">
         Notepad
    </div>

    <textarea placeholder="Write your notes here..."></textarea>

</div>
<!--drawing tool-->
<!-- DRAWING APP -->

<div id="drawingApp" class="window">

    <div class="windowHeader">
        Drawing Pad
    </div>

    <div style="padding:10px;">
        <button onclick="clearCanvas()">Clear</button>
        <input type="color" id="brushColor" value="#ffffff">
    </div>

    <canvas id="drawingCanvas"
        width="500"
        height="300"></canvas>

</div>

<!-- IMAGE -->

<img
id="cornerImage"
src="https://i.pinimg.com/236x/d0/4e/f2/d04ef2f6596eab4b2f9d9d1630d235a8.jpg"
alt="image">

<script>

/* Header Time */

function updateTime(){

    const now = new Date();

    document.getElementById("day").innerText =
    now.toLocaleDateString(
    'en-US',
    {weekday:'long'}
    );

    document.getElementById("date").innerText =
    now.toLocaleDateString(
    'en-US',
    {
        day:'numeric',
        month:'long',
        year:'numeric'
    });

    document.getElementById("time").innerText =
    now.toLocaleTimeString(
    'en-US',
    {
        hour12:true
    });
}

setInterval(updateTime,1000);
updateTime();

/* Analog Clock */

function updateClock(){

    const now = new Date();

    const h =
    now.getHours()%12;

    const m =
    now.getMinutes();

    const s =
    now.getSeconds();

    document.querySelector(
    ".hourHand"
    ).style.transform =
    `rotate(${h*30+m/2}deg)`;

    document.querySelector(
    ".minuteHand"
    ).style.transform =
    `rotate(${m*6}deg)`;

    document.querySelector(
    ".secondHand"
    ).style.transform =
    `rotate(${s*6}deg)`;
}

setInterval(updateClock,1000);
updateClock();

/* Calculator */

function appendValue(v){
    document.getElementById("display").value += v;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){

    try{
        document.getElementById("display").value =
        eval(
        document.getElementById("display").value
        );
    }

    catch{
        alert("Invalid Expression");
    }
}

/* Draggable Windows */

function makeDraggable(element){

    const header =
    element.querySelector(
    ".windowHeader"
    );

    let dragging = false;

    let offsetX = 0;
    let offsetY = 0;

    header.onmousedown = function(e){

        dragging = true;

        offsetX =
        e.clientX -
        element.offsetLeft;

        offsetY =
        e.clientY -
        element.offsetTop;
    };

    document.onmousemove = function(e){

        if(!dragging) return;

        element.style.left =
        (e.clientX-offsetX)+"px";

        element.style.top =
        (e.clientY-offsetY)+"px";

        element.style.right = "auto";
    };

    document.onmouseup = function(){

        dragging = false;
    };
}

makeDraggable(
document.getElementById(
"calculator"
));

makeDraggable(
document.getElementById(
"notepad"
));
function makeClockDraggable(clock){

    const dragArea =
    document.getElementById(
    "clockDragArea"
    );

    let dragging=false;

    let offsetX=0;
    let offsetY=0;

    dragArea.onmousedown=function(e){

        dragging=true;

        offsetX=
        e.clientX-clock.offsetLeft;

        offsetY=
        e.clientY-clock.offsetTop;
    };

    document.onmousemove=function(e){

        if(!dragging) return;

        clock.style.left=
        (e.clientX-offsetX)+"px";

        clock.style.top=
        (e.clientY-offsetY)+"px";

        clock.style.transform="none";
    };

    document.onmouseup=function(){

        dragging=false;
    };
}

makeClockDraggable(
document.getElementById(
"bigClock"
));

makeDraggable(
document.getElementById("drawingApp")
);

const canvas =
document.getElementById(
"drawingCanvas"
);

const ctx =
canvas.getContext("2d");

let drawing = false;

canvas.addEventListener(
"mousedown",
startDraw
);

canvas.addEventListener(
"mousemove",
draw
);

canvas.addEventListener(
"mouseup",
stopDraw
);

canvas.addEventListener(
"mouseleave",
stopDraw
);

function startDraw(e){

    drawing = true;

    ctx.beginPath();

    ctx.moveTo(
        e.offsetX,
        e.offsetY
    );
}

function draw(e){

    if(!drawing) return;

    ctx.lineWidth = 3;

    ctx.lineCap = "round";

    ctx.strokeStyle =
    document.getElementById(
    "brushColor"
    ).value;

    ctx.lineTo(
        e.offsetX,
        e.offsetY
    );

    ctx.stroke();
}

function stopDraw(){

    drawing = false;

    ctx.beginPath();
}

function clearCanvas(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}
</script>

</body>
</html>
